//                        '2000-01-01' = completed (✓)
//
// Dates are computed relative to TODAY at seed time so task categories
// (overdue / today / upcoming) never drift as real time passes.
function seedDate(n) {
  const d = new Date();
  d.setDate(d.getDate() + n);
  return d.toISOString().split('T')[0];
}

async function runSeed() {
  logClear();
  const btn = document.getElementById('seedBtn');
  btn.disabled = true;

  try {
    // ── Step 1: Insert Practices ──────────────────────────────────────────────
    log('── Step 1: Creating practices ──', 'hdr');
    const practiceIdMap = {}; // name → uuid
    for (const p of PRACTICES) {
      const { data, error } = await db.from('practices').insert(p).select('id,name').maybeSingle();
      if (error) { log(`  ERR ${p.name}: ${error.message}`, 'err'); continue; }
      practiceIdMap[p.name] = data.id;
      log(`  ✓ ${p.name}`, 'ok');
    }

    // ── Step 2: Insert Locations ──────────────────────────────────────────────
    log('\n── Step 2: Creating practice locations ──', 'hdr');
    const locationIdMap = {}; // "practice_name|address" → uuid
    for (const [practiceName, locs] of Object.entries(LOCATIONS)) {
      const practice_id = practiceIdMap[practiceName];
      if (!practice_id) { log(`  SKIP ${practiceName} — practice not found`, 'warn'); continue; }
      for (const loc of locs) {
        const { data, error } = await db.from('practice_locations')
          .insert({ ...loc, practice_id })
          .select('id').maybeSingle();
        if (error) { log(`  ERR ${loc.address}: ${error.message}`, 'err'); continue; }
        locationIdMap[`${practiceName}|${loc.address}`] = data.id;
        log(`  ✓ ${practiceName} — ${loc.label}`, 'ok');
      }
    }

    // ── Step 3: Insert Providers ──────────────────────────────────────────────
    log('\n── Step 3: Creating providers ──', 'hdr');
    let podCount = 0, wcCount = 0, dermCount = 0;
    for (const [first_name, last_name, degree, specialty, priority, proj_vol, is_target, practiceName] of PROVIDERS) {
      const { data, error } = await db.from('providers').insert({
        first_name, last_name, degree, specialty, priority,
        proj_vol: String(proj_vol), is_target,
        general_notes: specialty === 'Dermatology' ? 'Mohs surgeon' : null,
      }).select('id').maybeSingle();
      if (error) { log(`  ERR ${first_name} ${last_name}: ${error.message}`, 'err'); continue; }

      // ── Step 4: Assign to primary location ───────────────────────────────
      const practice_id = practiceIdMap[practiceName];
      if (practice_id) {
        // Find first location for this practice
        const locKey = Object.keys(locationIdMap).find(k => k.startsWith(`${practiceName}|`));
        const practice_location_id = locKey ? locationIdMap[locKey] : null;
        if (practice_location_id) {
          await db.from('provider_location_assignments').insert({
            provider_id: data.id,
            practice_location_id,
            is_primary: true,
          });
        }
      }

      if (specialty === 'Podiatry')     podCount++;
      if (specialty === 'Wound Care')   wcCount++;
      if (specialty === 'Dermatology')  dermCount++;
      log(`  ✓ ${first_name} ${last_name}, ${degree} — ${specialty} (Tier ${priority})`, 'ok');
    }

    // ── Step 5: Insert contact logs ───────────────────────────────────────────
    log('\n── Step 5: Seeding contact history ──', 'hdr');
    // Build provider name → id map
    const { data: allProvs } = await db.from('providers').select('id, first_name, last_name');
    const provIdMap = {};
    (allProvs || []).forEach(p => { provIdMap[`${p.first_name}|${p.last_name}`] = p.id; });
    let logCount = 0;
    for (const [first, last, contact_date, author, notes, reminder_date] of CONTACT_LOGS) {
      const provider_id = provIdMap[`${first}|${last}`];
      if (!provider_id) { log(`  SKIP log for ${first} ${last} — not found`, 'warn'); continue; }
      const entry = { provider_id, contact_date, author, notes };
      if (reminder_date) entry.reminder_date = reminder_date;
      const { error } = await db.from('contact_logs').insert(entry);
      if (error) { log(`  ERR log ${first} ${last}: ${error.message}`, 'err'); continue; }
      logCount++;
      log(`  ✓ ${first} ${last} — ${contact_date}${reminder_date ? ' (reminder '+reminder_date+')' : ''}`, 'ok');
    }

    // ── Done ─────────────────────────────────────────────────────────────────
    log('\n── Complete ──', 'hdr');
    log(`  Practices:    ${PRACTICES.length}`, 'ok');
    log(`  Locations:    ${Object.values(LOCATIONS).flat().length}`, 'ok');
    log(`  Providers:    ${PROVIDERS.length} total`, 'ok');
    log(`    Podiatry:     ${podCount}`, 'ok');
    log(`    Wound Care:   ${wcCount}`, 'ok');
    log(`    Dermatology:  ${dermCount} (Mohs only)`, 'ok');
    log(`  Contact logs: ${logCount} (incl. ${CONTACT_LOGS.filter(l=>l[5]).length} reminders)`, 'ok');
    const autoRedirect = new URLSearchParams(window.location.search).get('autorun') === 'true';
    if (autoRedirect) {
      log('\nReturning to CRM in 3 seconds…', 'hdr');
      setTimeout(() => window.location.href = '/CRMtool/', 3000);
    } else {
      log('\nOpen index.html to verify data in the CRM.', 'hdr');
    }

  } catch (e) {
    log(`\nFATAL: ${e.message}`, 'err');
  } finally {
    btn.disabled = false;
  }
}

// Auto-run if ?autorun=true (triggered by Reset Demo button in the app)
window.addEventListener('load', async () => {
  if (new URLSearchParams(window.location.search).get('autorun') === 'true') {
    document.getElementById('seedBtn').disabled = true;
    log('Auto-reset triggered from CRM…\n', 'hdr');
    await clearAll(true);
    await runSeed();
  }
});

async function clearAll(silent = false) {
  if (!silent && !confirm('Delete ALL demo data? This cannot be undone.')) return;
  logClear();
  log('Clearing all tables...', 'warn');
  const dummy = '00000000-0000-0000-0000-000000000000';
  for (const t of ['contact_logs','provider_location_assignments','providers','practice_locations','practices']) {
    const { error } = await db.from(t).delete().neq('id', dummy);
    if (error) log(`ERR clearing ${t}: ${error.message}`, 'err');
    else log(`  ✓ Cleared ${t}`, 'ok');
  }
  log('Done.', 'hdr');
}
</script>
